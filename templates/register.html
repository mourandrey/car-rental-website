<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <!--Bootstrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <!--Folha de estilo-->
    <link rel="stylesheet" href="{{url_for('static', filename='main.css')}}">
</head>
<body class="bg-register">
<nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='logo1.png') }}" alt="Luxury Wheels" height="40"></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor02" aria-controls="navbarColor02" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarColor02">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="{{ url_for('home') }}">Início
            <span class="visually-hidden">(current)</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('carros') }}">Carros</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('minhas_reservas') }}">Minhas Reservas</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('contactos') }}">Contactos</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<main class="container p-4">
    <h1 class="display-4 text-center mt-4 titulo">Luxury Wheels</h1>
    <h5 class="text-center text-muted mb-4">Criar nova conta</h5>
    <div class="row justify-content-center">
        <div class="col-md-6">
<form action="{{ url_for('registar') }}" method="POST">
    <!-- Mostra mensagem de erro caso as duas senhas não sejam iguais -->
    {% if erro %}
    <div class="alert alert-danger mt-3">{{ erro }}</div>
    {% endif %}
<!-- Formulário para inserir os dados do cliente para fazer o registo -->
<div>
  <fieldset>
    <label class="form-label" for="primeiro_nome"></label>
    <input class="form-control" id="primeiro_nome" type="text" name="primeiro_nome" placeholder="Primeiro nome" required>
  </fieldset>
</div>
<div>
  <fieldset>
    <label class="form-label" for="ultimo_nome"></label>
    <input class="form-control" id="ultimo_nome" type="text" name="ultimo_nome" placeholder="Último nome" required>
  </fieldset>
</div>
<div>
  <fieldset>
    <label class="form-label" for="email"></label>
    <input class="form-control" id="email" type="text" name="email" placeholder="E-mail" required>
  </fieldset>
</div>
<div>
      <label class="form-label" for="senha"></label>
      <input type="password" class="form-control" id="senha" name="senha" placeholder="Senha" required autocomplete="off">
    </div>
<div>
      <label class="form-label" for="senha2"></label>
      <input type="password" class="form-control" id="senha2" name="senha2" placeholder="Repita a senha" required autocomplete="off">
    </div>
    <button type="submit" class="btn btn-primary btn-lg mt-4">Registar</button>
</form>




</body>
</html>
