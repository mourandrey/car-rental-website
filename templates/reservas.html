<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reservas</title>
    <!--Bootstrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <!--Folha de estilo-->
    <link rel="stylesheet" href="{{url_for('static', filename='main.css')}}">
</head>
<body class="bg-reservas">
<nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='logo1.png') }}" alt="Luxury Wheels" height="40"></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor02" aria-controls="navbarColor02" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarColor02">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="{{ url_for('home') }}">Início
            <span class="visually-hidden">(current)</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('carros') }}">Carros</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('minhas_reservas') }}">Minhas Reservas</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('contactos') }}">Contactos</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
    <h3>Reserva do veículo</h3>

    <!-- Dados do carro -->
    <p>Carro: {{ carro.marca }} {{ carro.modelo }}</p>
    <p>Preço por dia: €{{ diaria }}</p>

    <!-- Mensagem de erro, caso aconteça -->
    {% if erro %}
        <div class="alert alert-danger">
            {{ erro }}
        </div>
    {% endif %}

    <!-- Reserva feita com sucesso -->
    {% if reservado %}
        <div class="alert alert-success">
            {{ reservado }}
        </div>
    {% endif %}

<form method="POST" action="">
    <div class="mb-3">
    <label class="form-label"> Data de início:</label>
    <input type="date" name="data_inicio" class="form-control" required>
    </div>
    <div class="mb-3">
    <label class="form-label"> Data final:</label>
    <input type="date" name="data_fim" class="form-control" required>
    </div>
    <div class="mb-3">
    <label class="form-label">Forma de Pagamento:</label>
    <select name="forma_pagamento" class="form-control">
        <option value="cartao">Cartão</option>
        <option value="mbway">MBWay</option>
        <option value="dinheiro">Dinheiro</option>
    </select>
    </div>
    <button type="submit" class="btn btn-primary">Reservar</button>
        </div>
    </div>
</form>
</body>
</html>
